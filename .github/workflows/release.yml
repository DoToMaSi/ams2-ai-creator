name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor HEAD origin/master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,dev-gui]"

      - name: Lint and test
        run: |
          ruff check .
          ruff format --check .
          pytest --tb=short
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build executable and zip archive
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AMS2-Creator-windows.zip
