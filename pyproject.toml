[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ams2-ai-creator"
version = "0.1.0"
description = "Desktop tool to create and manage Automobilista 2 custom AI driver XML files"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["PySide6>=6.6"]

[project.scripts]
ams2-ai-creator = "ams2_ai.ui.app:main"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-qt>=4", "ruff>=0.8", "pyinstaller>=6"]

[tool.hatch.build.targets.wheel]
packages = ["ams2_ai"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
qt_api = "pyside6"
